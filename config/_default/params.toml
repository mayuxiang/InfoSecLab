mainSections   = ["post"]
rssFullContent = true
favicon        = "img/favicon.png"

[footer]
    since = 2024

[sidebar]
    emoji    = "🔐"
    subtitle = "Information Security · Artificial Intelligence · Embodied Intelligence"

[article]
    [article.license]
        enabled = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page     = [{ type = "toc" }]

[comments]
    enabled = false

[cookies]
    enabled = false

[appearance]
    colorScheme = "dark"
